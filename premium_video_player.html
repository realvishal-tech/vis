<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video Player</title>
    <style>
        :root {
            --primary: #e50914;
            /* Premium OTT Accent (Netflix Red) */
            --bg-color: #000;
            --text-color: #fff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f0f0f;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Upload Area UI */
        .upload-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 16px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .upload-container h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .upload-container p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .upload-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.3);
        }

        .upload-btn:hover {
            background-color: #f40612;
            transform: scale(1.05);
        }

        input[type="file"] {
            display: none;
        }

        /* Video Player Container */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            background-color: var(--bg-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            aspect-ratio: 16 / 9;
            display: none;
            /* Hidden until loaded */
        }

        .video-container.fullscreen {
            max-width: 100%;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            cursor: pointer;
        }

        /* Custom Controls Overlay */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0) 100%);
            display: flex;
            flex-direction: column;
            padding: 20px 20px 15px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .video-container.show-controls .controls {
            opacity: 1;
            pointer-events: auto;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            margin-bottom: 15px;
            position: relative;
            transition: height 0.2s ease;
        }

        .progress-container:hover {
            height: 6px;
        }

        .progress-filled {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
            width: 0%;
            position: relative;
            pointer-events: none;
        }

        .progress-filled::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 14px;
            height: 14px;
            background: var(--primary);
            border-radius: 50%;
            transition: transform 0.2s ease;
        }

        .progress-container:hover .progress-filled::after {
            transform: translateY(-50%) scale(1);
        }

        /* Bottom Controls Row */
        .controls-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .controls-left,
        .controls-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        button.control-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            transition: transform 0.2s ease, opacity 0.2s;
            opacity: 0.85;
        }

        button.control-btn:hover {
            transform: scale(1.15);
            opacity: 1;
        }

        button.control-btn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .time-display {
            font-size: 14px;
            font-variant-numeric: tabular-nums;
            user-select: none;
            opacity: 0.9;
        }

        /* Volume Slider */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            width: 0;
            opacity: 0;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            cursor: pointer;
            -webkit-appearance: none;
            background: transparent;
        }

        .volume-container:hover .volume-slider {
            width: 80px;
            opacity: 1;
        }

        .volume-slider::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #fff;
            margin-top: -4px;
        }

        /* Status Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            font-size: 16px;
            margin-bottom: 16px;
            text-align: center;
            color: #ff4d4d;
        }

        .retry-btn {
            background-color: white;
            color: black;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Action Pop Animation (Play/Pause/Seek) */
        .center-action-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.5);
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }

        .center-action-icon svg {
            width: 36px;
            height: 36px;
            fill: white;
        }

        .center-action-icon.animate {
            animation: actionPop 0.5s ease forwards;
        }

        @keyframes actionPop {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.5);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .volume-container {
                display: none;
            }

            /* Hide volume on mobile */
            .controls {
                padding: 10px 15px;
            }

            .controls-left,
            .controls-right {
                gap: 12px;
            }

            button.control-btn svg {
                width: 24px;
                height: 24px;
            }
        }
    </style>
    <link rel="stylesheet" href="modern-theme.css" />
</head>

<body>

    <div class="upload-container" id="uploadContainer">
        <h2>OTT-Grade Video Player</h2>
        <p>Instant Playback • Local Processing • Zero Buffering • Privacy Secured</p>
        <button class="upload-btn" onclick="document.getElementById('videoUpload').click()">Select Video</button>
        <input type="file" id="videoUpload" accept="video/mp4,video/x-m4v,video/*" />
    </div>

    <div class="video-container" id="videoContainer">
        <video id="videoPlayer" preload="auto" playsinline></video>

        <div class="overlay" id="loadingOverlay">
            <div class="spinner"></div>
        </div>

        <div class="overlay" id="errorOverlay">
            <div class="error-msg">Playback interrupted. This format might not be supported.</div>
            <button class="retry-btn" id="retryBtn">Retry</button>
        </div>

        <div class="center-action-icon" id="centerActionIcon"></div>

        <div class="controls" id="controls">
            <div class="progress-container" id="progressContainer">
                <div class="progress-filled" id="progressFilled"></div>
            </div>

            <div class="controls-main">
                <div class="controls-left">
                    <button class="control-btn" id="playPauseBtn">
                        <svg viewBox="0 0 24 24">
                            <path id="playPauseIcon" d="M8 5v14l11-7z" />
                        </svg>
                    </button>

                    <div class="volume-container">
                        <button class="control-btn" id="muteBtn">
                            <svg viewBox="0 0 24 24">
                                <path id="muteIcon"
                                    d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                            </svg>
                        </button>
                        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05"
                            value="1">
                    </div>

                    <div class="time-display">
                        <span id="currentTime">00:00</span> / <span id="durationTime">00:00</span>
                    </div>
                </div>

                <div class="controls-right">
                    <button class="control-btn" id="fullscreenBtn">
                        <svg viewBox="0 0 24 24">
                            <path id="fullscreenIcon"
                                d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const videoUpload = document.getElementById('videoUpload');
        const uploadContainer = document.getElementById('uploadContainer');
        const videoContainer = document.getElementById('videoContainer');
        const video = document.getElementById('videoPlayer');

        const playPauseBtn = document.getElementById('playPauseBtn');
        const playPauseIcon = document.getElementById('playPauseIcon');
        const progressContainer = document.getElementById('progressContainer');
        const progressFilled = document.getElementById('progressFilled');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');
        const muteBtn = document.getElementById('muteBtn');
        const muteIcon = document.getElementById('muteIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenIcon = document.getElementById('fullscreenIcon');

        const loadingOverlay = document.getElementById('loadingOverlay');
        const errorOverlay = document.getElementById('errorOverlay');
        const centerActionIcon = document.getElementById('centerActionIcon');

        const icons = {
            play: 'M8 5v14l11-7z',
            pause: 'M6 19h4V5H6v14zm8-14v14h4V5h-4z',
            volumeHigh: 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z',
            volumeMuted: 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z',
            fullscreen: 'M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z',
            fullscreenExit: 'M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z',
            forward: 'M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z',
            rewind: 'M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z'
        };

        let controlsTimeout;
        let lastTap = 0;

        // Local Blob URL generator ensuring zero buffering for uploaded files
        videoUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            video.src = URL.createObjectURL(file);
            uploadContainer.style.display = 'none';
            videoContainer.style.display = 'block';
            showControls();
            video.play().catch(() => togglePlay());
        });

        // Core Playback Logic
        function togglePlay() {
            if (video.paused) { video.play(); showCenterIcon(icons.play); }
            else { video.pause(); showCenterIcon(icons.pause); }
        }
        video.addEventListener('click', togglePlay);
        playPauseBtn.addEventListener('click', togglePlay);
        video.addEventListener('play', () => { playPauseIcon.setAttribute('d', icons.pause); hideControlsDelay(); });
        video.addEventListener('pause', () => { playPauseIcon.setAttribute('d', icons.play); showControls(); });

        // Timeline & Seeking
        video.addEventListener('timeupdate', () => {
            if (!video.duration) return;
            progressFilled.style.width = `${(video.currentTime / video.duration) * 100}%`;
            currentTimeEl.textContent = formatTime(video.currentTime);
        });
        video.addEventListener('loadedmetadata', () => { durationTimeEl.textContent = formatTime(video.duration); });

        let isDragging = false;
        const scrub = (e) => {
            const pos = (e.offsetX / progressContainer.offsetWidth) * video.duration;
            video.currentTime = pos;
        };
        progressContainer.addEventListener('mousedown', (e) => { isDragging = true; scrub(e); });
        window.addEventListener('mouseup', () => isDragging = false);
        progressContainer.addEventListener('mousemove', (e) => { if (isDragging) scrub(e); });

        // Volume Management
        const updateVolumeUI = () => muteIcon.setAttribute('d', video.volume === 0 || video.muted ? icons.volumeMuted : icons.volumeHigh);
        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            volumeSlider.value = video.muted ? 0 : (video.volume || 1);
            updateVolumeUI();
        });
        volumeSlider.addEventListener('input', (e) => {
            video.volume = e.target.value;
            video.muted = e.target.value == 0;
            updateVolumeUI();
        });

        // Fullscreen Engine
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                (videoContainer.requestFullscreen || videoContainer.webkitRequestFullscreen || videoContainer.msRequestFullscreen).call(videoContainer);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen).call(document);
            }
        }
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        const handleFsChange = () => {
            const isFs = !!document.fullscreenElement;
            fullscreenIcon.setAttribute('d', isFs ? icons.fullscreenExit : icons.fullscreen);
            videoContainer.classList.toggle('fullscreen', isFs);
        };
        ['fullscreenchange', 'webkitfullscreenchange', 'msfullscreenchange'].forEach(ev => document.addEventListener(ev, handleFsChange));

        // Smart UI Hiding
        function showControls() {
            videoContainer.classList.add('show-controls');
            clearTimeout(controlsTimeout);
            if (!video.paused) hideControlsDelay();
        }
        function hideControlsDelay() {
            clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => { if (!video.paused) videoContainer.classList.remove('show-controls'); }, 3000);
        }
        videoContainer.addEventListener('mousemove', showControls);
        videoContainer.addEventListener('mouseleave', () => { if (!video.paused) videoContainer.classList.remove('show-controls'); });

        // Resilience & Auto-Recovery
        video.addEventListener('waiting', () => loadingOverlay.classList.add('active'));
        video.addEventListener('playing', () => { loadingOverlay.classList.remove('active'); errorOverlay.classList.remove('active'); });
        video.addEventListener('canplay', () => loadingOverlay.classList.remove('active'));
        video.addEventListener('error', () => {
            loadingOverlay.classList.remove('active');
            errorOverlay.classList.add('active');
            showControls();
        });
        document.getElementById('retryBtn').addEventListener('click', () => {
            errorOverlay.classList.remove('active');
            loadingOverlay.classList.add('active');
            video.load();
            video.play().catch(() => { });
        });

        // Utilities
        function formatTime(s) {
            if (isNaN(s)) return "00:00";
            const min = Math.floor(s / 60), sec = Math.floor(s % 60);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }
        function showCenterIcon(path) {
            centerActionIcon.innerHTML = `<svg viewBox="0 0 24 24"><path d="${path}"/></svg>`;
            centerActionIcon.classList.remove('animate');
            void centerActionIcon.offsetWidth;
            centerActionIcon.classList.add('animate');
        }

        // Mobile Gesture System (Double Tap to Seek)
        video.addEventListener('touchstart', (e) => {
            const now = new Date().getTime();
            if (now - lastTap < 300 && now - lastTap > 0) {
                const touchX = e.changedTouches[0].clientX;
                if (touchX < videoContainer.offsetWidth / 2) {
                    video.currentTime = Math.max(0, video.currentTime - 10);
                    showCenterIcon(icons.rewind);
                } else {
                    video.currentTime = Math.min(video.duration, video.currentTime + 10);
                    showCenterIcon(icons.forward);
                }
                e.preventDefault();
            }
            lastTap = now;
        });

        // Keyboard Access
        window.addEventListener('keydown', (e) => {
            if (videoContainer.style.display === 'none') return;
            switch (e.key.toLowerCase()) {
                case ' ': case 'k': e.preventDefault(); togglePlay(); showControls(); break;
                case 'f': e.preventDefault(); toggleFullscreen(); break;
                case 'arrowright': case 'l': e.preventDefault(); video.currentTime += 10; showControls(); showCenterIcon(icons.forward); break;
                case 'arrowleft': case 'j': e.preventDefault(); video.currentTime -= 10; showControls(); showCenterIcon(icons.rewind); break;
                case 'm': e.preventDefault(); muteBtn.click(); showControls(); break;
            }
        });
    </script>
  <script src="modern-effects.js"></script>
  <script src="enhancements.js"></script>
</body>

</html>
