<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | BCA STORE</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="modern-theme.css" />
  <style>
    body {
      background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    .error-card {
      text-align: center;
      max-width: 500px;
      padding: 40px;
      z-index: 10;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 950;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 20px;
    }
    .error-title {
      font-size: 2rem;
      margin-bottom: 16px;
      font-weight: 800;
    }
    .error-msg {
      color: rgba(255,255,255,0.7);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn-wrap {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="hero-bg-orb orb1"></div>
  <div class="hero-bg-orb orb2"></div>

  <div class="error-card">
    <div class="error-code">404</div>
    <h1 class="error-title">Lost in Cyberspace?</h1>
    <p class="error-msg">The page you're looking for might have been moved, deleted, or never existed in the first place.</p>
    <div class="btn-wrap">
      <a href="index.html" class="btn-primary" style="text-decoration:none;">🏠 Back to Home</a>
      <a href="semester.html?sem=1" class="btn-outline" style="text-decoration:none; color:#fff; border-color:rgba(255,255,255,0.3);">📖 Browse Subjects</a>
    </div>
  </div>
  <script src="modern-effects.js"></script>
  <script src="enhancements.js"></script>
</body>
</html>
